name: Enrich match data (highlights / facts)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1,7,13 * 6,7 *"

permissions:
  contents: write
  actions: write

concurrency:
  group: wc2026-state
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build highlights (DAZN Japan / YouTube)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_highlights.py

      - name: Build match facts (TheSportsDB)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_match_facts.py

      - name: Build news (Google News RSS)
        run: python scripts/build_news.py

      - name: Build match stats (ESPN)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_match_stats.py

      - name: Build match predictions (Slack reaction votes)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_match_predictions.py

      # data/** の push で pages.yml が走りサイトへ反映されるため [skip ci] は付けない
      - name: Commit enriched data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "No enrich changes"
            exit 0
          fi
          git commit -m "chore: update highlights / match facts"
          if ! git push; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
          # GITHUB_TOKENによるpushはpages.ymlを自動起動しないため明示的にdispatchする。
          # dispatch は副作用で、GitHub API が一時的に HTTP 500 を返すことがあるため
          # 失敗しても enrich ジョブ (データ commit/push は成功済み) は落とさない。
          #
          # in-flight ガード (2026-07-12 追加)
          # pages を無条件 dispatch すると queue が捌けず、キャンセルされた run が
          # github-pages 環境に waiting のデプロイを残して環境をロックする
          # (2026-07-09〜07-12 に実際に発生しサイトが3日間更新停止した)
          # 復旧手順: docs/teardown.md「Pages が詰まったときの復旧」
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/runs?per_page=20" \
            > pages_runs.json || echo '{"workflow_runs":[]}' > pages_runs.json
          active=$(jq '[.workflow_runs[] | select(.status != "completed")] | length' pages_runs.json)
          if [ "${active:-0}" -gt 0 ]; then
            echo "pages already in flight (${active} run(s)); skip dispatch"
            exit 0
          fi
          gh workflow run pages.yml || echo "::warning::pages dispatch failed (non-fatal); next run will retry"
        env:
          GH_TOKEN: ${{ github.token }}
