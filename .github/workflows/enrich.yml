name: Enrich match data (highlights / facts)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1,7,13 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: wc2026-state
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build highlights (DAZN Japan / YouTube)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_highlights.py

      - name: Build match facts (TheSportsDB)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_match_facts.py

      - name: Build news (Google News RSS)
        run: python scripts/build_news.py

      - name: Build match stats (ESPN)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_match_stats.py

      # data/** の push で pages.yml が走りサイトへ反映されるため [skip ci] は付けない
      - name: Commit enriched data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "No enrich changes"
            exit 0
          fi
          git commit -m "chore: update highlights / match facts"
          if ! git push; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
          # GITHUB_TOKENによるpushはpages.ymlを自動起動しないため明示的にdispatchする
          gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ github.token }}
