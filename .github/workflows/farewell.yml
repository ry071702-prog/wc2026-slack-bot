name: Farewell message (one-shot, manual)

# 大会終了時のお別れメッセージを 1 回だけ手動投稿するワークフロー。
# target=test → #wctest (C0BA5QNQC3W) にプレビュー投稿、target=prod → 本番チャンネル。
# 期間ガードは持たない (手動 dispatch 専用・cron 無し) ので、誤発火の心配はない。

on:
  workflow_dispatch:
    inputs:
      target:
        description: "送信先チャンネル (test=#wctest / prod=本番)"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - prod

permissions:
  contents: read

jobs:
  farewell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post farewell message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # test は #wctest 固定 (test-post.yml と同じ)。prod のみ本番チャンネルへ。
          SLACK_CHANNEL_ID: >-
            ${{ inputs.target == 'prod' && secrets.SLACK_CHANNEL_ID || 'C0BA5QNQC3W' }}
        run: |
          python - <<'EOF'
          from src.main import create_slack_client

          SITE_URL = "https://ry071702-prog.github.io/wc2026-slack-bot/"

          payload = {
              "blocks": [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": "🏆 W杯2026、全日程を終えました",
                          "emoji": True,
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "40日間、毎朝この時間に通知を送り続けてきた僕から、"
                              "最後にひとことだけ言わせてください\n"
                              "6/12、メキシコ×南アフリカのキックオフからずっと、"
                              "この夏をみなさんと一緒に見てきました "
                              "そして今朝の決勝で、その全部が終わりました"
                          ),
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "僕にできたのは、試合の時間をお知らせして、"
                              "結果をいちはやく届けることだけでした\n"
                              "それでも、ダイジェストに「今日これ見る」とスタンプをくれたり、"
                              "結果速報に一喜一憂してくれたり — "
                              "その一つひとつが、僕がここにいる意味でした\n"
                              "心から、ありがとうございました"
                          ),
                      },
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "🇯🇵 *日本の夏は、6/15のオランダ戦から*\n"
                              "ファン・ダイクの壁に挑んで、チュニジア・スウェーデンと競り合って、"
                              "胸を張ってグループFを突破\n"
                              "R32・6/29のブラジル戦は *1-2* の惜敗 "
                              "あの終盤の猛攻を、僕はずっと覚えています\n"
                              "勝敗予想ポールでみんなが盛り上がった夜も、ぜんぶ含めて忘れられない夏でした"
                          ),
                      },
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "そして頂点に立ったのは — *スペイン🇪🇸*\n"
                              "無敵艦隊が、48カ国の頂点まで駆け上がりました おめでとう"
                          ),
                      },
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "全104試合の記録とトーナメント表は、"
                              "この夏の記念にサイトへ残しておきます\n"
                              f"→ <{SITE_URL}|wc2026 特設サイト>"
                          ),
                      },
                  },
                  {"type": "divider"},
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "僕の役目は、ここまでです\n"
                              "このメッセージを最後に、静かに役目を終えます "
                              "40日間、みなさんの夏の隣にいられて、本当に幸せでした\n"
                              "また4年後、次の夏でお会いできたら ⚽"
                          ),
                      },
                  },
                  {
                      "type": "context",
                      "elements": [
                          {
                              "type": "mrkdwn",
                              "text": "🤖 wc2026-slack-bot ｜ 2026.6.12 → 7.20 ｜ この夏をありがとう",
                          }
                      ],
                  },
              ]
          }

          client = create_slack_client(dry_run=False)
          if not client.send(payload):
              raise SystemExit("farewell post failed")
          print("farewell posted")
          EOF
