name: World Cup match notifications

on:
  schedule:
    - cron: "*/10 * * 6,7 *"
  workflow_dispatch:
    inputs:
      poll_lead_hours:
        description: "投票のリード時間(時間)を一時上書き。空なら既定14h (手動で早めに出したい時用)"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

concurrency:
  group: wc2026-state
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send notifications
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          NOTIFY_MINUTES_BEFORE: ${{ vars.NOTIFY_MINUTES_BEFORE || '15' }}
          MENTION_JAPAN: ${{ vars.MENTION_JAPAN || 'false' }}
          # 深夜帯もチャンネル全員の許可を得て通知する (2026-06-12)。再制限する場合は Variables の QUIET_HOURS に "01:00-06:30" 等を設定
          QUIET_HOURS: ${{ vars.QUIET_HOURS || '' }}
          # 手動dispatch時のみ inputs で上書き可。cron(空input)は既定14h
          POLL_LEAD_HOURS: ${{ inputs.poll_lead_hours || vars.POLL_LEAD_HOURS || '14' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: |
          set -o pipefail
          python -m src.main --mode notify | tee notify.log

      # 試合中・結果直後はサイトを再ビルドして「ほぼLIVE」のスコア/順位表にする
      - name: Trigger site rebuild while matches are live
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! grep -qE "live_now=[1-9]|result=[1-9]" notify.log; then
            echo "no live matches; skip rebuild"
            exit 0
          fi

          # in-flight ガード (2026-07-12 追加)
          # pages は 1回 4〜5分かかる  無条件に dispatch すると queue が捌けず、
          # 後から来た run が古い pending run をキャンセルし続ける
          # デプロイ着手後にキャンセルされると github-pages 環境に "waiting" の
          # デプロイが残って環境がロックされ、以後すべての pages run が pending で詰まる
          # (2026-07-09〜07-12 に実際に発生し、サイトが3日間更新停止した)
          # → 実行中/待機中の pages run がある間は dispatch しない
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/runs?per_page=20" \
            > pages_runs.json || echo '{"workflow_runs":[]}' > pages_runs.json
          active=$(jq '[.workflow_runs[] | select(.status != "completed")] | length' pages_runs.json)
          if [ "${active:-0}" -gt 0 ]; then
            since=$(date -u -d '20 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
            stuck=$(jq --arg since "$since" \
              '[.workflow_runs[] | select(.status != "completed") | select(.created_at < $since)] | length' \
              pages_runs.json)
            if [ "${stuck:-0}" -gt 0 ]; then
              echo "::warning::pages run が20分以上 pending です (github-pages 環境に waiting のデプロイが残っている可能性)  復旧手順: docs/teardown.md の「Pages が詰まったときの復旧」"
            fi
            echo "pages already in flight (${active} run(s)); skip dispatch"
            exit 0
          fi

          # pages dispatch は副作用。GitHub API が一時的に HTTP 500 を返すことが
          # あるため数回リトライし、最終的に失敗しても notify ジョブは落とさない
          # (通知本体は成功しているため。次回の実行で再度dispatchされる)。
          dispatched=0
          for attempt in 1 2 3; do
            if gh workflow run pages.yml; then
              echo "pages rebuild dispatched (live/finished matches detected, attempt ${attempt})"
              dispatched=1
              break
            fi
            echo "pages dispatch attempt ${attempt} failed; retrying in 5s..."
            sleep 5
          done
          if [ "$dispatched" -eq 0 ]; then
            echo "::warning::pages rebuild dispatch failed after retries (non-fatal); next run will retry"
          fi

      # enrich (ハイライト/ニュース/得点詳細) のGitHub cronは間引かれるため、
      # 確実に動くこのworkflowから毎時1回dispatchする (分が0-4の実行時のみ)
      - name: Hourly enrich dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(date -u +%M)" -lt 5 ]; then
            # こちらも副作用 dispatch。失敗しても notify ジョブは落とさない。
            if gh workflow run enrich.yml; then
              echo "enrich dispatched (hourly)"
            else
              echo "::warning::enrich dispatch failed (non-fatal)"
            fi
          else
            echo "not the hourly slot; skip"
          fi

      # 日本戦キックオフ前のスタメン自動取得 (窓外は "no window" で即終了する超軽量チェック)
      # KO-50〜-20分: ニュース→Gemini抽出→26人照合 / KO-20〜-5分: 予想スタメンで保険投稿
      - name: Auto lineup check
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set -o pipefail
          python scripts/fetch_lineup_auto.py | tee lineup_check.log

      # LINEUP_READY が出たときだけ描画ライブラリを入れて本番チャンネルへ投稿する
      # (mplsoccer のインストールを毎5分のcronに入れない)。
      # 投稿失敗時は state を更新せず正常終了 → 次の5分で再試行。
      - name: Auto lineup post
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          lineup=$(grep -oE "^LINEUP_READY=[A-Za-z0-9_-]+" lineup_check.log | head -1 | cut -d= -f2 || true)
          if [ -z "$lineup" ]; then
            echo "no lineup ready; skip"
            exit 0
          fi
          match_id=$(grep -oE "^LINEUP_MATCH_ID=[0-9]+" lineup_check.log | head -1 | cut -d= -f2)
          flags=""
          if grep -qE "^LINEUP_READY=.* FALLBACK=1" lineup_check.log; then
            flags="--fallback"
          fi
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          pip install -r requirements-lineup.txt
          if python scripts/post_lineup.py $flags "data/lineups/${lineup}.json"; then
            LINEUP_MATCH_ID="$match_id" python - <<'PYEOF'
          import os
          from pathlib import Path
          from src.state import StateStore

          store = StateStore(Path("state/notified.json"))
          state = store.load()
          match_id = int(os.environ["LINEUP_MATCH_ID"])
          if match_id not in state["lineup"]:
              state["lineup"].append(match_id)
              store.save(state)
          PYEOF
            echo "lineup posted: ${lineup} (match_id=${match_id})"
          else
            echo "lineup post failed; will retry on next run"
          fi

      - name: Commit notification state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/notified.json
          if git diff --cached --quiet; then
            echo "No state changes"
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          if ! git push; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
