name: World Cup match notifications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: wc2026-state
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send notifications
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          NOTIFY_MINUTES_BEFORE: ${{ vars.NOTIFY_MINUTES_BEFORE || '15' }}
          MENTION_JAPAN: ${{ vars.MENTION_JAPAN || 'false' }}
          # 深夜帯もチャンネル全員の許可を得て通知する (2026-06-12)。再制限する場合は Variables の QUIET_HOURS に "01:00-06:30" 等を設定
          QUIET_HOURS: ${{ vars.QUIET_HOURS || '' }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: |
          set -o pipefail
          python -m src.main --mode notify | tee notify.log

      # 試合中・結果直後はサイトを再ビルドして「ほぼLIVE」のスコア/順位表にする
      - name: Trigger site rebuild while matches are live
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if grep -qE "live_now=[1-9]|result=[1-9]" notify.log; then
            gh workflow run pages.yml
            echo "pages rebuild dispatched (live/finished matches detected)"
          else
            echo "no live matches; skip rebuild"
          fi

      - name: Commit notification state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/notified.json
          if git diff --cached --quiet; then
            echo "No state changes"
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          if ! git push; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
