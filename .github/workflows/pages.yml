name: Deploy World Cup site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "scripts/**"
      - "src/**"
      - "data/**"
  schedule:
    - cron: "0 21 * 6,7 *"
    - cron: "0 9 * 6,7 *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # 2026-07-12: 旧グループ名 "pages" が GitHub 側で幽霊ロックされ、
  # 唯一の run でもジョブが起動せず pending のまま詰まる状態に陥った
  # (デプロイ着手後にキャンセルされた run がグループを掴んだまま解放されなかった)
  # グループ名を変えて詰まったグループから脱出する
  group: pages-deploy
  # 進行中の Pages デプロイをキャンセルせず完了させる (キャンセルすると
  # 後続が "in progress deployment" HTTP 400 で落ちて失敗通知が出るため)
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_site_data.py

      # 任意アセット: 失敗してもサイト全体のデプロイは止めない (continue-on-error)
      - name: Build matchup cards
        continue-on-error: true
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          pip install pillow
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python scripts/build_matchups.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
