name: Event-bot preview to #wctest (manual)

# 内定者イベントbot (別リポジトリ naitei-event-bot) の投稿サンプルを、
# WC bot のトークンを借りて #wctest に流し「見た目」を確認する一発ワークフロー。
# 同一ワークスペースなので chat.postMessage / reactions.add がそのまま通る。
# 送信先は #wctest (C0BA5QNQC3W) 固定・本番チャンネルには絶対に出さない。
# これはあくまで文面プレビュー (対話機能= /event・集計・DM承認 は含まない)。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post event-bot samples to #wctest
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL_ID: C0BA5QNQC3W
        run: |
          python - <<'EOF'
          import os
          import requests

          TOKEN = os.environ["SLACK_BOT_TOKEN"]
          CHANNEL = os.environ["CHANNEL_ID"]
          H = {"Authorization": f"Bearer {TOKEN}"}
          MARK = (
              "🧪 *[プレビュー] 内定者イベントbot の投稿サンプル*"
              " — 本番は内定者イベントで自動投稿されます\n\n"
          )

          def post(text):
              r = requests.post(
                  "https://slack.com/api/chat.postMessage",
                  headers=H, json={"channel": CHANNEL, "text": text}, timeout=10,
              ).json()
              if not r.get("ok"):
                  raise SystemExit(f"chat.postMessage failed: {r.get('error')}")
              print(f"posted ts={r.get('ts')}")
              return r.get("ts")

          def react(ts, name):
              r = requests.post(
                  "https://slack.com/api/reactions.add",
                  headers=H,
                  json={"channel": CHANNEL, "timestamp": ts, "name": name},
                  timeout=10,
              ).json()
              if not r.get("ok") and r.get("error") != "already_reacted":
                  print(f"reactions.add {name} skipped: {r.get('error')}")

          # 1) 参加者が最初に見る「イベント告知」(僕ペルソナ・脱AI)+ RSVP 種付け
          announcement = (
              ":mega: 28卒のみなさんへ、僕から相談会のお誘いです\n\n"
              "内定者が、自分たちの就活のリアルをそのまま話す会を開きます\n"
              "「ぶっちゃけどう動いた?」「ESって何書いたの?」みたいな、"
              "聞きにくいことこそ気軽に投げてほしい60分です\n\n"
              "📅 8/4(火) 19:00〜20:00 ・ 📍 Zoom ・ 🎯 28卒向け\n"
              "✨ 参加してくれた人には IS選考免除の特典つき\n"
              "⏰ 締切は 8/3(月) 23:59\n\n"
              "行けそうならリアクションで教えてください 僕が数えておきます"
          )
          ts = post(MARK + announcement)
          react(ts, "raised_hand")
          react(ts, "thinking_face")

          # 2) 締切前の「リマインド」(公開・実テンプレート)
          reminder = (
              "「28卒向けオンライン就活相談会 (8/4)」の締切、そろそろです\n\n"
              "📅 8/4(火) 19:00\n"
              "📍 Zoom\n"
              "⏰ 締切 2026/08/03 09:00\n"
              "いまのところ 参加 3名 ・ 迷い中 1名\n\n"
              "行けそうなら :raised_hand:、まだ迷ってるなら :thinking_face: "
              "を押してもらえたら、僕が拾っておきます"
          )
          post(MARK + reminder)

          # 3) 締切時の「結果発表」(公開・実テンプレート)
          result = (
              "「28卒向けオンライン就活相談会 (8/4)」の受付を締め切りました\n"
              "📅 8/4(火) 19:00\n"
              "3名が集まりました 当日どうぞよろしくお願いします"
          )
          post(MARK + result)

          # 4) 「週次イベント一覧」(実テンプレート)
          weekly = (
              ":wave: 近いうちにあるイベント、僕からまとめておきます\n\n"
              "• 28卒向けオンライン就活相談会 (8/7)\n"
              "  📅 8/7(金) 19:00 ・ 📍 Zoom ・ ⏰ 締切 2026/08/04 00:00\n"
              "  💬 第2回 就活相談会\n"
              "  ✋ 参加 1名 ・ 🤔 未定 0名"
          )
          post(MARK + weekly)

          print("event-bot preview posted (4 messages)")
          EOF
