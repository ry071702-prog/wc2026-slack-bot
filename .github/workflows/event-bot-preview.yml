name: Event-bot preview to #wctest (manual)

# 内定者イベントbot (別リポジトリ naitei-event-bot) の投稿サンプルを、
# WC bot のトークンを借りて #wctest に流し「見た目」を確認する一発ワークフロー。
# 同一ワークスペースなので chat.postMessage / reactions.add がそのまま通る。
# 送信先は #wctest (C0BA5QNQC3W) 固定・本番チャンネルには絶対に出さない。
# これはあくまで文面プレビュー (対話機能= /event・集計・DM承認 は含まない)。

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post event-bot samples to #wctest
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL_ID: C0BA5QNQC3W
        run: |
          python - <<'EOF'
          import os
          import requests

          TOKEN = os.environ["SLACK_BOT_TOKEN"]
          CHANNEL = os.environ["CHANNEL_ID"]
          H = {"Authorization": f"Bearer {TOKEN}"}
          MARK = (
              "🧪 *[プレビュー] 内定者イベントbot の投稿サンプル*"
              " — 本番は内定者イベントで自動投稿されます\n\n"
          )

          def divided_blocks(text):
              # 空行区切りの段落を section にし、間に divider(横線)を挟む
              paragraphs = [p for p in text.split("\n\n") if p.strip()]
              blocks = []
              for i, para in enumerate(paragraphs):
                  if i:
                      blocks.append({"type": "divider"})
                  blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": para}})
              return blocks

          def post(text):
              r = requests.post(
                  "https://slack.com/api/chat.postMessage",
                  headers=H,
                  json={"channel": CHANNEL, "text": text, "blocks": divided_blocks(text)},
                  timeout=10,
              ).json()
              if not r.get("ok"):
                  raise SystemExit(f"chat.postMessage failed: {r.get('error')}")
              print(f"posted ts={r.get('ts')}")
              return r.get("ts")

          def react(ts, name):
              r = requests.post(
                  "https://slack.com/api/reactions.add",
                  headers=H,
                  json={"channel": CHANNEL, "timestamp": ts, "name": name},
                  timeout=10,
              ).json()
              if not r.get("ok") and r.get("error") != "already_reacted":
                  print(f"reactions.add {name} skipped: {r.get('error')}")

          # 1) 募集投稿(長め・参加したくなる一言つき)+ RSVP 実リアクション
          announcement = (
              "28卒のみなさん、就活相談会やります！\n\n"
              "去年就活してた内定者が、実際どう動いたか全部話します\n"
              "ESでも面接でも、気になること全部聞いてOKです\n"
              "参加した人はIS選考免除の特典つき、雑談感覚で大丈夫です\n\n"
              "8/4(火) 19:00〜20:00\n"
              "Zoom\n"
              "締切 8/3(月) 23:59\n\n"
              "参加できそうなら :raised_hand:、迷ってる人は :thinking_face: だけでもOKです！"
          )
          ts = post(MARK + announcement)
          react(ts, "raised_hand")
          react(ts, "thinking_face")

          # 2) リマインド(短く)
          reminder = (
              "「28卒向けオンライン就活相談会 (8/4)」まだ受付中です！\n\n"
              "8/4(火) 19:00\n"
              "Zoom\n"
              "2026/08/03 09:00 まで\n\n"
              "行けそうなら :raised_hand:、迷ってたら :thinking_face: だけでもOKです！"
          )
          post(MARK + reminder)

          # 3) 結果発表(もっと短く)
          result = (
              "「28卒向けオンライン就活相談会 (8/4)」しめきりました！\n\n"
              "3名集まりました、当日たのしみにしてます"
          )
          post(MARK + result)

          # 4) 一覧(超簡潔・名前/日時/場所/人数だけ)
          weekly = (
              "今週〜来週にあるイベントです\n\n"
              "■ 28卒向けオンライン就活相談会 (8/7)\n"
              "8/7(金) 19:00\n"
              "Zoom\n"
              ":raised_hand: 1名　:thinking_face: 0名"
          )
          post(MARK + weekly)

          print("event-bot preview posted (4 messages)")
          EOF
