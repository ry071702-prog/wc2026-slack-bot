name: Verify data source (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch 2026 WC matches (2026-06-11..13)
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python - <<'EOF'
          from datetime import date

          from src.messages import digest_match_line
          from src.providers.football_data import FootballDataProvider
          import os

          from src.messages import TEAM_NAMES

          provider = FootballDataProvider(os.environ["FOOTBALL_DATA_API_KEY"])
          matches = provider.fetch_matches(date(2026, 6, 11), date(2026, 7, 20))
          print(f"matches: {len(matches)}")
          for match in matches[:5]:
              print(f"  {match.kickoff_jst:%m/%d} {digest_match_line(match)} [{match.status}]")
          if not matches:
              raise SystemExit("NG: 2026大会の試合が返りません。API-FOOTBALLへの差し替えを検討してください")
          teams = {name for m in matches for name in (m.home, m.away)}
          unmapped = sorted(t for t in teams if t not in TEAM_NAMES and t != "TBD")
          print(f"teams: {len(teams)}, unmapped: {len(unmapped)}")
          for name in unmapped:
              print(f"  unmapped: {name}")
          print("OK: football-data.org free tier returns 2026 World Cup data")
          EOF

      - name: Verify API-FOOTBALL coverage (WC2026)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python - <<'EOF'
          import os

          import requests

          BASE = "https://v3.football.api-sports.io"
          headers = {"x-apisports-key": os.environ["API_FOOTBALL_KEY"]}

          def get(path, **params):
              resp = requests.get(
                  f"{BASE}/{path}", headers=headers, params=params, timeout=10
              )
              resp.raise_for_status()
              data = resp.json()
              if data.get("errors"):
                  raise SystemExit(f"NG: {path}: {data['errors']}")
              remaining = resp.headers.get("x-ratelimit-requests-remaining")
              print(f"{path}: results={data.get('results')} (quota残 {remaining})")
              return data["response"]

          leagues = get("leagues", id=1, season=2026)
          if not leagues:
              raise SystemExit("NG: league=1 season=2026 が見つかりません")
          season = next(
              s for s in leagues[0]["seasons"] if s["year"] == 2026
          )
          cov = season["coverage"]
          print(f"coverage: lineups={cov['fixtures']['lineups']}, "
                f"players={cov['players']}, "
                f"top_scorers={cov['top_scorers']}")

          teams = get("teams", league=1, season=2026)
          japan = [t["team"] for t in teams if t["team"]["name"] == "Japan"]
          if not japan:
              raise SystemExit("NG: Japan が teams に見つかりません")
          print(f"Japan team id: {japan[0]['id']}")

          squad = get("players/squads", team=japan[0]["id"])
          players = squad[0]["players"] if squad else []
          print(f"Japan squad: {len(players)}人")
          for p in players[:3]:
              print(f"  #{p.get('number')} {p.get('position')} {p.get('name')}")
          if not cov["fixtures"]["lineups"]:
              print("WARN: lineups coverage=false → スタメン図は手動フォールバック")
          print("OK: API-FOOTBALL is usable for WC2026")
          EOF

      - name: Verify Slack bot token and channel
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python - <<'EOF'
          import os

          import requests

          token = os.environ["SLACK_BOT_TOKEN"]
          channel = os.environ["SLACK_CHANNEL_ID"]
          headers = {"Authorization": f"Bearer {token}"}

          resp = requests.post(
              "https://slack.com/api/auth.test", headers=headers, timeout=10
          )
          data = resp.json()
          if not data.get("ok"):
              raise SystemExit(f"NG: auth.test failed: {data.get('error')}")
          print(f"auth.test OK: team={data['team']}, bot={data['user']}")
          print(f"scopes: {resp.headers.get('x-oauth-scopes')}")

          required = {"chat:write", "files:write", "commands"}
          granted = set((resp.headers.get("x-oauth-scopes") or "").split(","))
          missing = required - granted
          if missing:
              raise SystemExit(f"NG: missing scopes: {sorted(missing)}")

          post = requests.post(
              "https://slack.com/api/chat.postMessage",
              headers=headers,
              json={
                  "channel": channel,
                  "text": "🧪 Bot Token テスト投稿 — chat.postMessage 疎通OK",
              },
              timeout=10,
          ).json()
          if not post.get("ok"):
              raise SystemExit(
                  f"NG: chat.postMessage failed: {post.get('error')} "
                  "(not_in_channel の場合はチャンネルに /invite @WCUP2026)"
              )
          print(f"chat.postMessage OK: channel={post['channel']}")
          print("OK: Slack bot token is ready")
          EOF
