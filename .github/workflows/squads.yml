name: Build squads (manual)

on:
  workflow_dispatch:
  schedule:
    - cron: "10 0 11 6 *"  # 2026-06-11 9:10 JST 残り10カ国の再取得 (クォータリセット後)

permissions:
  contents: write
  actions: write

concurrency:
  group: wc2026-state
  cancel-in-progress: false

jobs:
  squads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch squads
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_squads.py

      - name: Commit squads data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/squads.json data/api_football_team_ids.json
          if git diff --cached --quiet; then
            echo "No squad changes"
            exit 0
          fi
          git commit -m "chore: update squads data"
          if ! git push; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
          # GITHUB_TOKENによるpushはpages.ymlを自動起動しないため明示的にdispatchする
          gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ github.token }}
