name: Build squads (manual)

on:
  workflow_dispatch:
  schedule:
    - cron: "10 0 11 6 *"  # 2026-06-11 9:10 JST 残り10カ国の再取得 (クォータリセット後)

permissions:
  contents: write
  actions: write

concurrency:
  group: wc2026-state
  cancel-in-progress: false

jobs:
  squads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch squads
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/build_squads.py

      - name: Commit squads data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/squads.json data/api_football_team_ids.json
          if git diff --cached --quiet; then
            echo "No squad changes"
            exit 0
          fi
          git commit -m "chore: update squads data"
          if ! git push; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
          # GITHUB_TOKENによるpushはpages.ymlを自動起動しないため明示的にdispatchする。
          # dispatch は副作用で、GitHub API が一時的に HTTP 500 を返すことがあるため
          # 失敗しても squads ジョブ (データ commit/push は成功済み) は落とさない。
          #
          # in-flight ガード (2026-07-12 追加)
          # pages を無条件 dispatch すると queue が捌けず、キャンセルされた run が
          # github-pages 環境に waiting のデプロイを残して環境をロックする
          # (2026-07-09〜07-12 に実際に発生しサイトが3日間更新停止した)
          # 復旧手順: docs/teardown.md「Pages が詰まったときの復旧」
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/runs?per_page=20" \
            > pages_runs.json || echo '{"workflow_runs":[]}' > pages_runs.json
          active=$(jq '[.workflow_runs[] | select(.status != "completed")] | length' pages_runs.json)
          if [ "${active:-0}" -gt 0 ]; then
            echo "pages already in flight (${active} run(s)); skip dispatch"
            exit 0
          fi
          gh workflow run pages.yml || echo "::warning::pages dispatch failed (non-fatal); next run will retry"
        env:
          GH_TOKEN: ${{ github.token }}
